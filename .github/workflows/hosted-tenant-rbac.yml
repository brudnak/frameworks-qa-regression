name: Run Hosted Tenant RBAC Suite
run-name: "rv:${{ inputs.rancher_version }} | profile:${{ inputs.profile }} | suite:hosted-tenant-rbac"

on:
  workflow_dispatch:
    inputs:
      profile:
        description: GitHub environment profile to use for Rancher secrets
        required: true
        type: string
      rancher_version:
        description: Rancher version label for reporting
        required: true
        type: string
      notes:
        description: Optional launch notes
        required: false
        type: string

permissions:
  contents: read

jobs:
  run-hosted-tenant-rbac:
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile }}
    concurrency:
      group: hosted-tenant-rbac-${{ inputs.profile }}
      cancel-in-progress: false
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Clone Rancher Tests Repository
        run: |
          git clone https://github.com/rancher/tests.git
          cd tests

      - name: Create hosted tenant config file
        run: |
          cat > cattle-config.yaml <<EOF
          rancher:
            host: "${{ secrets.RANCHER_HOST }}"
            adminToken: "${{ secrets.RANCHER_ADMIN_TOKEN }}"
            cleanup: true
            insecure: true
            clusterName: "${{ secrets.CLUSTER_NAME }}"

          tenantRanchers:
            clients:
              - host: "${{ secrets.TENANT_RANCHER_HOST }}"
                adminToken: "${{ secrets.TENANT_RANCHER_ADMIN_TOKEN }}"
                cleanup: true
                insecure: true
                clusterName: "${{ secrets.TENANT_CLUSTER_NAME }}"
          EOF

      - name: Print run context
        run: |
          echo "Profile: ${{ inputs.profile }}"
          echo "Rancher version: ${{ inputs.rancher_version }}"
          echo "Notes: ${{ inputs.notes }}"

      - name: Run Hosted Tenant RBAC Suite
        env:
          CATTLE_TEST_CONFIG: ${{ github.workspace }}/cattle-config.yaml
        run: |
          cd tests
          go test -v -tags=validation,infra.any,cluster.any ./validation/hostedtenant/rbac -run TestHostedRancherTestSuite
