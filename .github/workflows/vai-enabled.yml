name: Run VAI Test Suite
run-name: "rv:${{ inputs.rancher_version }} | profile:${{ inputs.profile }} | suite:vai-enabled"

on:
  workflow_dispatch:
    inputs:
      profile:
        description: GitHub environment profile to use for Rancher secrets
        required: true
        type: string
      rancher_version:
        description: Rancher version label for reporting
        required: true
        type: string
      notes:
        description: Optional launch notes
        required: false
        type: string

permissions:
  contents: read

jobs:
  run-vai-test:
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile }}
    concurrency:
      group: vai-enabled-${{ inputs.profile }}
      cancel-in-progress: false
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'

      - name: Clone Your Fork and Branch
        run: |
          git clone -b brudnak-more-idx-fields https://github.com/brudnak/tests.git
          cd tests
          # Show current branch to confirm
          git branch --show-current
          git log -1 --oneline

      - name: Create config file
        run: |
          # Create the cattle config file
          cat > cattle-config.yaml <<EOF
          rancher:
            host: "${{ secrets.RANCHER_HOST }}"
            adminToken: "${{ secrets.RANCHER_ADMIN_TOKEN }}"
            cleanup: true
            insecure: true
            clusterName: "${{ secrets.CLUSTER_NAME }}"
          EOF

      - name: Print run context
        run: |
          echo "Profile: ${{ inputs.profile }}"
          echo "Rancher version: ${{ inputs.rancher_version }}"
          echo "Notes: ${{ inputs.notes }}"

      - name: Install Dependencies
        run: |
          cd tests
          # Install any required dependencies
          go mod download
          go mod tidy

      - name: Run VAI Enabled Test
        env:
          CATTLE_TEST_CONFIG: ${{ github.workspace }}/cattle-config.yaml
        run: |
          cd tests
          # Run the specific test from the test suite
          # Using the exact path and build tags from the test file
          go test -v -timeout 30m \
            -tags="validation,infra.any,cluster.any,extended" \
            ./validation/steve/vai \
            -run TestVaiTestSuite/TestVaiEnabled
